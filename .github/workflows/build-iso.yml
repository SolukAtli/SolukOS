name: Build ISO

on:
  push:
    tags:
      - 'iso-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare systemd enablement symlinks
        run: |
          mkdir -p iso/airootfs/etc/systemd/system/multi-user.target.wants
          mkdir -p iso/airootfs/etc/systemd/system/getty.target.wants
          ln -sf /usr/lib/systemd/system/NetworkManager.service \
            iso/airootfs/etc/systemd/system/multi-user.target.wants/NetworkManager.service
          ln -sf ../solukos-live-user.service \
            iso/airootfs/etc/systemd/system/multi-user.target.wants/solukos-live-user.service
          ln -sf ../solukos-cli-setup.service \
            iso/airootfs/etc/systemd/system/multi-user.target.wants/solukos-cli-setup.service
          ln -sf /usr/lib/systemd/system/sddm.service \
            iso/airootfs/etc/systemd/system/display-manager.service
          ln -sf /usr/lib/systemd/system/graphical.target \
            iso/airootfs/etc/systemd/system/default.target
          ln -sf /usr/lib/systemd/system/debug-shell.service \
            iso/airootfs/etc/systemd/system/getty.target.wants/debug-shell.service

      - name: Bake the soluk CLI into the ISO
        run: |
          mkdir -p iso/airootfs/opt/solukos
          cp -r bin scripts plugins packages config assets docs \
            install.sh README.md VERSION LICENSE \
            iso/airootfs/opt/solukos/
          # Note: mkarchiso resets all airootfs file permissions to 644/755
          # regardless of what's set here, unless listed in profiledef.sh's
          # file_permissions array (see there for bin/soluk + install.sh).
          # Everything else under /opt/solukos is invoked via explicit
          # `bash script.sh` or sourced, so it doesn't need +x at all.

      - name: Build calamares-git from AUR (Faz 6, Asama 1 - proof only)
        run: |
          mkdir -p local-repo
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            archlinux:latest \
            bash -c "
              set -e
              pacman-key --init
              pacman-key --populate archlinux
              pacman -Sy --noconfirm archlinux-keyring
              pacman -Syu --noconfirm --needed base-devel git \
                kcoreaddons kpmcore libpwquality python python-jsonschema \
                python-yaml qt6-declarative qt6-svg yaml-cpp cmake \
                extra-cmake-modules libglvnd ninja pybind11 qt6-tools \
                qt6-translations
              useradd -m builder
              echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers
              chown -R builder:builder /workspace/local-repo
              su builder -c '
                set -e
                cd /tmp
                git clone https://aur.archlinux.org/calamares-git.git
                cd calamares-git
                makepkg --noconfirm --needed
                cp -v *.pkg.tar.zst /workspace/local-repo/
              '
              repo-add /workspace/local-repo/solukos-local.db.tar.gz /workspace/local-repo/*.pkg.tar.zst
            "

      - name: Build ISO (archiso inside Arch Linux container)
        run: |
          docker run --rm --privileged \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            archlinux:latest \
            bash -c "
              set -e
              pacman-key --init
              pacman-key --populate archlinux
              pacman -Sy --noconfirm archlinux-keyring
              pacman -Syu --noconfirm archiso grub
              chmod +x iso/profiledef.sh
              mkarchiso -v -w work -o out iso
              chown -R \"\${HOST_UID}:\${HOST_GID}\" /workspace/out
            "

      - name: Rename ISO
        run: |
          ISO_FILE=$(find out -maxdepth 1 -name '*.iso' | head -n1)
          NAME="SolukOS-Linux-${GITHUB_REF_NAME}.iso"
          mv "$ISO_FILE" "out/$NAME"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: solukos-iso
          path: out/*.iso
          retention-days: 14

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.iso
          generate_release_notes: true
