[options]
Architecture = auto
CheckSpace
SigLevel = Required DatabaseOptional
LocalFileSigLevel = Optional
ParallelDownloads = 5

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

#[multilib]
#Include = /etc/pacman.d/mirrorlist

# calamares-git, built from AUR by the "Build calamares-git from AUR" CI
# step into /workspace/local-repo (not present outside that build - this
# repo simply won't resolve if you try to build locally without that step).
[local]
SigLevel = Optional TrustAll
Server = file:///workspace/local-repo
