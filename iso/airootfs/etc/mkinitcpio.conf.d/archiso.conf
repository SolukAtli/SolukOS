# mkinitcpio HOOKS for the SolukOS Linux live image.
#
# Deliberately does NOT include 'autodetect' - this initramfs is built
# inside a GitHub Actions container (no real disks), so autodetect would
# only bundle drivers relevant to that container, not to whatever real
# hardware someone actually boots this ISO on. Broad support instead.
#
# 'archiso' is the hook (from the mkinitcpio-archiso package) that finds
# and mounts the live medium (USB/optical) as /sysroot.

HOOKS=(base systemd keyboard sd-vconsole modconf microcode kms block archiso archiso_loop_mnt filesystems fsck)
