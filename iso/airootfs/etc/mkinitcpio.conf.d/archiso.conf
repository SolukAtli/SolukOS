# mkinitcpio HOOKS for the SolukOS Linux live image.
# This is the exact content from archiso's official baseline profile
# (configs/baseline/airootfs/etc/mkinitcpio.conf.d/archiso.conf), fetched
# directly from source rather than reconstructed from memory.
#
# Critically this uses the 'udev' hook, NOT 'systemd' - the 'archiso'
# hook (which searches for and mounts the live medium) is written
# against the classic udev-based initramfs framework. Our previous,
# unconfigured default (linux package's own preset) used the modern
# systemd-based HOOKS with 'autodetect', which both loaded the wrong
# init framework for the 'archiso' hook AND stripped storage drivers.

HOOKS=(base udev modconf archiso block filesystems)

